# ============================================================
# NL2BI Agent — 轻量部署（API + Streamlit 仅容器化）
# 适用场景：PostgreSQL / Ollama / ChromaDB 已在宿主机运行
# 启动: docker compose -f docker-compose.lite.yml up -d
# ============================================================

services:
  app:
    build: .
    container_name: nl2bi-app
    ports:
      - "8000:8000"
      - "8501:8501"
    environment:
      - PG_HOST=host.docker.internal
      - PG_PORT=${PG_PORT:-5432}
      - PG_DATABASE=${PG_DATABASE:-bi_demo}
      - PG_USER=${PG_USER:-bi_agent}
      - PG_PASSWORD=${PG_PASSWORD:-changeme}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - CHROMA_PERSIST_DIR=/app/chroma_data
      - HF_ENDPOINT=${HF_ENDPOINT:-https://hf-mirror.com}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./chroma_data:/app/chroma_data
      - C:/Users/86135/.cache/huggingface:/root/.cache/huggingface
    restart: unless-stopped
